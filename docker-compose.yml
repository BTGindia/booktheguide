version: "3.8"

services:
  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"

  wordpress:
    image: wordpress:6.5-php8.2-apache
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8000:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DEBUG: "1"
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME', 'http://localhost:8000');
        define('WP_SITEURL', 'http://localhost:8000');
        define('BTG_NEXT_URL', 'http://localhost:3000');
        define('BTG_REVALIDATION_SECRET', 'btg-revalidation-secret-2026');
        define('BTG_PREVIEW_SECRET', 'btg-preview-secret-2026');
        define('GRAPHQL_JWT_AUTH_SECRET_KEY', 'btg-jwt-local-dev-secret-2026');
        define('WP_MEMORY_LIMIT', '256M');
        define('DISABLE_WP_CRON', true);
    volumes:
      - wp_data:/var/www/html
      - ./wordpress/theme:/var/www/html/wp-content/themes/btg-headless

  wpcli:
    image: wordpress:cli-2.10-php8.2
    depends_on:
      - wordpress
      - db
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME', 'http://localhost:8000');
        define('WP_SITEURL', 'http://localhost:8000');
    volumes:
      - wp_data:/var/www/html
      - ./wordpress/theme:/var/www/html/wp-content/themes/btg-headless
    entrypoint: ["wp", "--allow-root"]

volumes:
  db_data:
  wp_data:
