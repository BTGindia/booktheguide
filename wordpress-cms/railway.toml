[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# /readme.html is a static file WordPress ships — no DB or PHP needed.
# This confirms Apache is up without requiring a configured database.
healthcheckPath = "/readme.html"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
